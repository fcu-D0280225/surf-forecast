<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>城市浪人</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0077b6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="城市浪人">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header>
      <div class="header-main">
        <div>
          <h1>🏄 城市浪人</h1>
          <p class="subtitle" id="forecast-date">載入中…</p>
        </div>
        <div class="header-actions">
          <span class="points-badge" id="points-badge" hidden></span>
          <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()" aria-label="重新整理">🔄</button>
          <button class="spot-toggle-btn" id="spot-toggle-btn" onclick="toggleSpotSelector()" aria-label="選擇浪點">
            ⚙️ 選擇浪點
          </button>
          <button class="logout-btn" id="logout-btn" onclick="doLogout()" hidden>登出</button>
        </div>
      </div>
    </header>

    <!-- Spot Selector Panel -->
    <div class="spot-selector" id="spot-selector" hidden>
      <h2>顯示哪些浪點？</h2>
      <p class="selector-hint">選取後即時更新，設定存在裝置上</p>
      <div class="spot-checkboxes" id="spot-checkboxes">
        <!-- dynamically generated -->
      </div>
      <div class="selector-actions">
        <button onclick="selectAll()">全選</button>
        <button onclick="selectNone()">全不選</button>
      </div>
    </div>

    <!-- ── Chat Section (主介面) ──────────────────────────────────────────── -->
    <section class="chat-section">
      <div class="quick-prompts" id="quick-prompts">
        <button onclick="quickAsk('今天哪個浪點最好？')">今天哪個最好？</button>
        <button onclick="quickAsk('我是初學者，適合去哪？')">初學者去哪？</button>
        <button onclick="quickAsk('現在幾點最適合下水？')">最佳時間？</button>
      </div>
      <div class="chat-log" id="chat-log">
        <div class="chat-msg chat-assistant">嗨！問我任何台灣浪況，或點上方快速問句開始 🏄</div>
      </div>
      <div class="chat-input-row">
        <input id="chat-input" class="chat-input" type="text"
               placeholder="問浪況…" onkeydown="chatKeydown(event)">
        <button class="chat-send" id="chat-send-btn" onclick="sendChat()">送出</button>
      </div>
    </section>

    <!-- ── Browse Section (次要，預設收折) ──────────────────────────────────── -->
    <section class="browse-section">
      <button class="browse-toggle" onclick="toggleBrowse()">
        <span>瀏覽所有浪點</span>
        <span class="browse-chevron" id="browse-chevron">▼</span>
      </button>
      <div id="browse-body" hidden>
        <main class="cards" id="cards">
          <div class="loading" id="loading">
            <div class="loading-wave">~</div>
            <p>載入預報資料中…</p>
          </div>
        </main>
        <div class="accuracy-bar" id="accuracy-bar" hidden></div>
      </div>
    </section>

    <!-- ── Weekly Report Section ────────────────────────────────────────────── -->
    <section class="weekly-section" id="weekly-section" hidden>
      <button class="browse-toggle" onclick="toggleWeekly()">
        <span>週末浪況預報（五六日）</span>
        <span class="browse-chevron" id="weekly-chevron">▼</span>
      </button>
      <div id="weekly-body" hidden>
        <div class="weekly-meta" id="weekly-meta"></div>
        <div class="weekly-cards" id="weekly-cards"></div>
      </div>
    </section>

    <!-- ── Report Section ────────────────────────────────────────────────────── -->
    <section class="report-section">
      <div class="report-label">回報浪況</div>
      <textarea id="report-input" class="report-textarea" rows="3"
        placeholder="自由填寫，例如：3/31 松柏港 10:00～12:00 浪況偏小且亂，週期約5秒，風浪干擾大"></textarea>
      <button class="report-send" onclick="submitReport()">送出回報</button>
      <div class="report-done" id="report-done" hidden>✅ 已記錄，謝謝回報！</div>
    </section>

    <!-- ── Footer ──────────────────────────────────────────────────────────── -->
    <footer class="app-footer">
      <a href="/about.html">城市浪人是什麼？查看特色 →</a>
    </footer>

  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
